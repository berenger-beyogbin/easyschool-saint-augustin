name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: easy_school_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: easy_school_test_db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Analyse statique (ruff)
        run: ruff check .

      - name: Verifier que les migrations Alembic s'appliquent proprement
        run: |
          # Reproduit la procedure documentee dans MIGRATIONS.md : create_tables()
          # produit le schema tel qu'une premiere installation le connait
          # aujourd'hui (create_all + blocs ad hoc geles), puis Alembic est
          # stampe sur la baseline correspondante avant de rejouer les
          # revisions suivantes. Si une revision echoue a s'appliquer
          # proprement depuis ce point de depart documente, la CI echoue.
          python -c "from app.database import init_db, create_tables; init_db(); create_tables()"
          alembic stamp f0e0bbadf6a8
          alembic upgrade head

      - name: Tests (pytest + couverture)
        run: pytest --cov --cov-report=term-missing
